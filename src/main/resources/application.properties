spring.application.name=finance

spring.datasource.url=jdbc:h2:mem:finance_tracker;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create
spring.jpa.open-in-view=false

spring.sql.init.mode=never

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

yahoo.finance.base-url=${YAHOO_FINANCE_BASE_URL:https://query2.finance.yahoo.com}
yahoo.finance.quote-path=${YAHOO_FINANCE_QUOTE_PATH:/v8/finance/chart}
yahoo.finance.region=${YAHOO_FINANCE_REGION:US}
yahoo.finance.user-agent=${YAHOO_FINANCE_USER_AGENT:Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36}
yahoo.finance.rapid-api-key=${YAHOO_FINANCE_API_KEY:}
yahoo.finance.rapid-api-host=${YAHOO_FINANCE_API_HOST:}

spring.datasource.url=${MYSQL_DB_URL:jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_DATABASE:finance_tracker}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${MYSQL_DB_USERNAME:${DB_USERNAME:root}}
spring.datasource.password=${MYSQL_DB_PASSWORD:${DB_PASSWORD:root}}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=validate

yahoo.finance.base-url=${YAHOO_FINANCE_BASE_URL:https://query2.finance.yahoo.com}
yahoo.finance.quote-path=${YAHOO_FINANCE_QUOTE_PATH:/v8/finance/chart}
yahoo.finance.region=${YAHOO_FINANCE_REGION:US}
yahoo.finance.user-agent=${YAHOO_FINANCE_USER_AGENT:Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36}


